<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>

<style>
:root {
--bg:#f4f6f7;
--surface:#fff;
--border:#e5e7eb;
--text:#1f2937;
--sub:#6b7280;
--accent:#5fa8a3;
--header:#3e6f73;
--accent-soft:#eef7f6;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:var(--header);
color:#fff;
padding:16px;
font-weight:600;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
border-bottom:1px solid var(--border);
display:flex;
gap:6px;
}
.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}
.search button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
}

/* LIST */
.list{
flex:1;
overflow:auto;
padding:10px;
}

/* CARD */
.card{
background:#fff;
border:1px solid var(--border);
border-radius:10px;
padding:12px;
margin-bottom:8px;
}

.title{font-weight:600;}
.meta{font-size:12px;color:var(--sub);margin-top:4px;}

.tag{
font-size:10px;
background:var(--accent-soft);
padding:2px 6px;
margin-right:4px;
border-radius:6px;
cursor:pointer;
}

/* FAB */
.fab{
position:fixed;
right:16px;
bottom:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:24px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.3);
display:none;
align-items:flex-end;
}
.modal.show{display:flex;}

.sheet{
background:#fff;
width:100%;
border-radius:16px 16px 0 0;
padding:16px;
max-height:90vh;
overflow:auto;
}

/* ← ここが重要：入力全体の幅統一 */
.form{
max-width:480px;
margin:0 auto;
}

/* 入力欄 */
input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:16px;
}

/* フォーカス */
input:focus,textarea:focus{
outline:none;
border:2px solid var(--accent);
}

/* date崩れ防止 */
input[type="date"]{
appearance:none;
-webkit-appearance:none;
min-height:44px;
}

/* PERSON */
.person-row{
display:flex;
gap:6px;
margin-bottom:6px;
}
.person-row input{flex:1;}

/* Add Person右寄せ */
.add-person-wrap{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

.small-btn{
padding:6px 8px;
font-size:12px;
border:none;
border-radius:6px;
background:#ddd;
}

/* BUTTON */
.btn{
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:#fff;
width:100%;
font-weight:600;
}

.tag-suggest{
display:flex;
flex-wrap:wrap;
gap:4px;
margin-bottom:10px;
}
.tag-suggest span{
font-size:10px;
background:#eee;
padding:4px 6px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Daily Memo</div>

<div class="search">
<input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') render()">
<button onclick="render()">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
<div class="sheet">

<div class="form">

<input id="date" type="date">

<div id="peopleArea"></div>

<div class="add-person-wrap">
<button class="small-btn" onclick="addPerson()">+ Add Person</button>
</div>

<input id="place" placeholder="Where">

<textarea id="content" placeholder="Memo"></textarea>

<div class="tag-suggest" id="tagSuggest"></div>
<input id="tags" placeholder="Tag">

<button class="btn" onclick="saveMemo()">Save</button>

</div>

</div>
</div>

<script>
const KEY="memo_v9";
let memos=JSON.parse(localStorage.getItem(KEY)||"[]");
let editIndex=null;

/* TAG */
function getAllTags(){
  const set=new Set();
  memos.forEach(m=> (m.tags||[]).forEach(t=>set.add(t)));
  return [...set];
}
function renderTagSuggest(){
  tagSuggest.innerHTML=getAllTags().map(t=>
    `<span onclick="addTag('${t}')">#${t}</span>`
  ).join("");
}
function addTag(tag){
  const current=tags.value.split(",").map(t=>t.trim()).filter(Boolean);
  if(!current.includes(tag)){
    current.push(tag);
    tags.value=current.join(", ");
  }
}

/* PERSON */
function addPerson(name="",company=""){
  const div=document.createElement("div");
  div.className="person-row";
  div.innerHTML=`
    <input placeholder="Company" value="${company}">
    <input placeholder="Name" value="${name}">
    <button onclick="this.parentElement.remove()">×</button>
  `;
  peopleArea.appendChild(div);
}

/* SEARCH */
function tok(t){
  t=(t||"").toLowerCase();
  const r=[];
  for(let i=0;i<t.length-1;i++) r.push(t.slice(i,i+2));
  return r;
}
function sim(a,b){
  const A=new Set(a),B=new Set(b);
  let i=0; A.forEach(x=>{if(B.has(x))i++;});
  return i/(A.size+B.size-i||1);
}
function search(q){
  if(!q) return memos.map((m,i)=>({m,i,score:1}));
  const qt=tok(q);
  return memos.map((m,i)=>{
    const text=[m.content,m.place,(m.tags||[]).join(" ")].join(" ");
    return {m,i,score:sim(qt,tok(text))};
  }).filter(x=>x.score>0.1).sort((a,b)=>b.score-a.score);
}

/* RENDER */
function render(){
  const q=searchInput.value;
  const res=search(q).sort((a,b)=> new Date(b.m.date)-new Date(a.m.date));

  list.innerHTML=res.map(r=>{
    return `
    <div class="card">
      <div class="title">${r.m.date||""}</div>
      <div class="meta">${r.m.place||""}</div>
      <div>${r.m.content||""}</div>
      <div>${(r.m.tags||[]).map(t=>`<span class="tag" onclick="filterByTag('${t}')">#${t}</span>`).join("")}</div>
      <div class="actions">
        <button onclick="editMemo(${r.i})">Edit</button>
        <button onclick="deleteMemo(${r.i})">Delete</button>
      </div>
    </div>`;
  }).join("");
}

/* MODAL */
function openModal(){
  modal.classList.add("show");
  date.value = new Date().toISOString().split('T')[0];
  peopleArea.innerHTML="";
  addPerson();
  renderTagSuggest();
  editIndex=null;
  setTimeout(()=>content.focus(),200);
}

function closeModal(){ modal.classList.remove("show"); }

/* SAVE */
function saveMemo(){
  const people=[...document.querySelectorAll(".person-row")]
    .map(r=>{
      const i=r.querySelectorAll("input");
      return {company:i[0].value,name:i[1].value};
    });

  const memo={
    date:date.value,
    content:content.value,
    place:place.value,
    people,
    tags:tags.value.split(",").map(t=>t.trim()).filter(Boolean)
  };

  if(editIndex!==null){ memos[editIndex]=memo; }
  else{ memos.unshift(memo); }

  localStorage.setItem(KEY,JSON.stringify(memos));
  closeModal();
  render();
}

/* EDIT */
function editMemo(i){
  const m=memos[i];
  openModal();
  date.value=m.date;
  content.value=m.content;
  place.value=m.place;
  tags.value=(m.tags||[]).join(", ");
  peopleArea.innerHTML="";
  (m.people||[]).forEach(p=>addPerson(p.name,p.company));
  editIndex=i;
}

/* DELETE */
function deleteMemo(i){
  if(confirm("Delete this memo?")){
    memos.splice(i,1);
    localStorage.setItem(KEY,JSON.stringify(memos));
    render();
  }
}

render();
</script>

</body>
</html>
