<!-- version: v13 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>

<style>
:root{
--bg:#f4f6f7;
--border:#e5e7eb;
--text:#1f2937;
--sub:#6b7280;
--accent:#5fa8a3;
--header:#3e6f73;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,sans-serif;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:var(--header);
color:#fff;
padding:16px;
font-weight:600;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
display:flex;
gap:6px;
border-bottom:1px solid var(--border);
}
.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}
.search button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
}

/* LIST */
.list{
flex:1;
overflow:auto;
padding:8px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
margin-bottom:6px;
cursor:pointer;
transition: transform 0.1s;
}
.card:active{ transform: scale(0.96); }

.card-left{
display:flex;
gap:10px;
}
.date{font-size:12px;color:var(--sub);}

.actions{
display:flex;
gap:8px;
}
.actions button{
border:none;
background:none;
font-size:16px;
}

/* FAB */
.fab{
position:fixed;
right:16px;
bottom:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:24px;
}
.fab:active{ transform: scale(0.96); }

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0);
display:none;
transition: background 0.3s;
}
.modal.show{
display:block;
background:rgba(0,0,0,0.3);
}

/* SHEET */
.sheet{
position:absolute;
bottom:0;
width:100%;
background:#fff;
border-radius:16px 16px 0 0;
padding:16px;
max-height:90vh;
overflow:auto;

/* スライド */
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
.modal.show .sheet{
transform: translateY(0);
}

/* ハンドル */
.handle{
width:40px;
height:4px;
background:#ccc;
border-radius:2px;
margin:0 auto 10px;
}

/* CLOSE */
.close-btn{
position:absolute;
top:10px;
right:12px;
font-size:28px;
border:none;
background:#fff;
border-radius:50%;
width:36px;
height:36px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.close-btn:active{ transform: scale(0.9); }

/* INPUT */
input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:16px;
}
input:focus,textarea:focus{
outline:none;
border:2px solid var(--accent);
}

/* PERSON */
.person-row{
display:flex;
gap:6px;
margin-bottom:6px;
}
.person-row input{flex:1;}

.add-person{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

/* BUTTON */
.btn{
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:#fff;
width:100%;
font-weight:600;
}
.btn:active{ transform: scale(0.96); }

</style>
</head>

<body>

<div class="header">Daily Memo</div>

<div class="search">
<input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') render()">
<button onclick="render()">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
<div class="sheet" id="sheet">

<div class="handle"></div>
<button class="close-btn" onclick="closeModal()">×</button>

<input id="date" type="date">
<input id="title" placeholder="Title">

<div id="peopleArea"></div>
<div class="add-person">
<button onclick="addPerson()">+ Add Person</button>
</div>

<input id="place" placeholder="Where">
<textarea id="content" placeholder="Memo"></textarea>
<input id="tags" placeholder="Tag">

<button class="btn" onclick="saveMemo()">Save</button>

</div>
</div>

<script>
const KEY="memo_v13";
let memos=JSON.parse(localStorage.getItem(KEY)||"[]");
let editIndex=null;

/* PERSON */
function addPerson(name="",company=""){
  const div=document.createElement("div");
  div.className="person-row";
  div.innerHTML=`
    <input placeholder="Company" value="${company}">
    <input placeholder="Name" value="${name}">
    <button onclick="this.parentElement.remove()">×</button>
  `;
  peopleArea.appendChild(div);
}

/* DRAG CLOSE */
let startY=0, currentY=0;
const sheet=document.getElementById("sheet");

sheet.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

sheet.addEventListener("touchmove",e=>{
  currentY=e.touches[0].clientY;
  const diff=currentY-startY;
  if(diff>0){
    sheet.style.transform=`translateY(${diff}px)`;
  }
});

sheet.addEventListener("touchend",()=>{
  const diff=currentY-startY;
  if(diff>120){
    closeModal();
  }else{
    sheet.style.transform="";
  }
});

/* SEARCH（簡易） */
function search(q){
  if(!q) return memos;
  return memos.filter(m =>
    (m.title+m.content+m.place).toLowerCase().includes(q.toLowerCase())
  );
}

/* RENDER */
function render(){
  const res=search(searchInput.value)
    .sort((a,b)=> new Date(b.date)-new Date(a.date));

  list.innerHTML=res.map((m,i)=>`
    <div class="card" onclick="openDetail(${i})">
      <div class="card-left">
        <div class="date">${m.date||""}</div>
        <div>${m.title||"(No title)"}</div>
      </div>
      <div class="actions">
        <button onclick="event.stopPropagation();editMemo(${i})">✏️</button>
        <button onclick="event.stopPropagation();deleteMemo(${i})">🗑️</button>
      </div>
    </div>
  `).join("");
}

/* MODAL */
function openModal(){
  modal.classList.add("show");
  date.value=new Date().toISOString().split('T')[0];
  title.value="";
  content.value="";
  place.value="";
  tags.value="";
  peopleArea.innerHTML="";
  addPerson();
  editIndex=null;
}
function closeModal(){
  modal.classList.remove("show");
  sheet.style.transform="";
}

/* SAVE */
function saveMemo(){
  const people=[...document.querySelectorAll(".person-row")]
    .map(r=>{
      const i=r.querySelectorAll("input");
      return {company:i[0].value,name:i[1].value};
    });

  const memo={
    date:date.value,
    title:title.value,
    content:content.value,
    place:place.value,
    people,
    tags:tags.value.split(",").map(t=>t.trim()).filter(Boolean)
  };

  if(editIndex!==null){memos[editIndex]=memo;}
  else{memos.unshift(memo);}

  localStorage.setItem(KEY,JSON.stringify(memos));
  closeModal();
  render();
}

/* EDIT */
function editMemo(i){
  const m=memos[i];
  openModal();
  date.value=m.date;
  title.value=m.title;
  content.value=m.content;
  place.value=m.place;
  tags.value=(m.tags||[]).join(", ");
  peopleArea.innerHTML="";
  (m.people||[]).forEach(p=>addPerson(p.name,p.company));
  editIndex=i;
}

/* DELETE */
function deleteMemo(i){
  if(confirm("Delete this memo?")){
    memos.splice(i,1);
    localStorage.setItem(KEY,JSON.stringify(memos));
    render();
  }
}

render();
</script>

</body>
</html>
