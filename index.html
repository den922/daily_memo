<!-- version: v14 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>

<style>
:root{
--bg:#f4f6f7;
--border:#e5e7eb;
--text:#1f2937;
--sub:#6b7280;
--accent:#5fa8a3;
--danger:#e57373;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,sans-serif;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:#3e6f73;
color:#fff;
padding:16px;
font-weight:600;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
display:flex;
gap:6px;
border-bottom:1px solid var(--border);
}
.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}
.search button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
}

/* LIST */
.list{
flex:1;
overflow:auto;
padding:8px;
}

/* SWIPE */
.swipe-wrap{
position:relative;
overflow:hidden;
margin-bottom:6px;
}
.delete-bg{
position:absolute;
right:0;
top:0;
bottom:0;
width:80px;
background:var(--danger);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.card{
background:#fff;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
cursor:pointer;
transition: transform 0.2s;
}
.card:active{ transform: scale(0.96); }

.card-left{
display:flex;
gap:10px;
}
.date{font-size:12px;color:var(--sub);}

/* FAB */
.fab{
position:fixed;
right:16px;
bottom:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:24px;
}
.fab:active{ transform: scale(0.96); }

/* TOAST */
.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#1f2937;
color:#fff;
padding:12px 16px;
border-radius:10px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
pointer-events:none;
transition:opacity 0.3s;
}
.toast.show{
opacity:1;
pointer-events:auto;
}
.toast button{
background:none;
border:none;
color:#7dd3fc;
font-weight:600;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:#fff;
padding:20px;
display:none;
overflow:auto;
}
.detail.show{ display:block; }

</style>
</head>

<body>

<div class="header">Daily Memo</div>

<div class="search">
<input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') render()">
<button onclick="render()">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openDetail()">+</button>

<div class="toast" id="toast">
<span>Deleted</span>
<button onclick="undoDelete()">Undo</button>
</div>

<div class="detail" id="detail"></div>

<script>
const KEY="memo_v14";
let memos=JSON.parse(localStorage.getItem(KEY)||"[]");
let lastDeleted=null;
let openSwipe=null;

/* SEARCH */
function search(q){
  if(!q) return memos;
  return memos.filter(m =>
    JSON.stringify(m).toLowerCase().includes(q.toLowerCase())
  );
}

/* RENDER */
function render(){
  const res=search(searchInput.value)
    .sort((a,b)=> new Date(b.date)-new Date(a.date));

  list.innerHTML=res.map((m,i)=>`
    <div class="swipe-wrap">
      <div class="delete-bg" onclick="confirmDelete(${i})">Delete</div>

      <div class="card"
        ontouchstart="touchStart(event,this)"
        ontouchmove="touchMove(event,this)"
        ontouchend="touchEnd(event,this)"
        onclick="openDetail(${i})">

        <div class="card-left">
          <div class="date">${m.date||""}</div>
          <div>${m.title||"(No title)"}</div>
        </div>

      </div>
    </div>
  `).join("");
}

/* SWIPE */
let startX=0,currentX=0,moved=false;

function touchStart(e,el){
  startX=e.touches[0].clientX;

  if(openSwipe && openSwipe!==el){
    openSwipe.style.transform="";
    openSwipe=null;
  }
}

function touchMove(e,el){
  currentX=e.touches[0].clientX;
  let diff=currentX-startX;

  if(Math.abs(diff)>10) moved=true;

  if(diff<0){
    el.style.transform=`translateX(${diff}px)`;
  }
}

function touchEnd(e,el){
  if(moved){ e.stopPropagation(); }
  moved=false;

  let diff=currentX-startX;

  if(diff < -80){
    el.style.transform="translateX(-80px)";
    openSwipe=el;
  }
  else if(diff > 40){
    el.style.transform="";
    openSwipe=null;
  }
  else{
    el.style.transform="";
  }
}

/* DELETE */
function confirmDelete(i){
  if(confirm("Delete this memo?")){
    lastDeleted={item:memos[i],index:i};
    memos.splice(i,1);
    localStorage.setItem(KEY,JSON.stringify(memos));
    render();
    showToast();
  }
}

/* TOAST */
let toastTimer=null;

function showToast(){
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    toast.classList.remove("show");
    lastDeleted=null;
  },3000);
}

function undoDelete(){
  if(!lastDeleted) return;
  memos.splice(lastDeleted.index,0,lastDeleted.item);
  localStorage.setItem(KEY,JSON.stringify(memos));
  render();
  toast.classList.remove("show");
  lastDeleted=null;
}

/* DETAIL */
function openDetail(i){
  if(i===undefined){
    detail.innerHTML=`
      <input id="date" type="date">
      <input id="title" placeholder="Title">
      <textarea id="content" placeholder="Memo"></textarea>
      <button onclick="save()">Save</button>
    `;
  }else{
    const m=memos[i];
    detail.innerHTML=`
      <h2>${m.title}</h2>
      <p>${m.date}</p>
      <p>${m.content}</p>
      <button onclick="edit(${i})">Edit</button>
    `;
  }
  detail.classList.add("show");
}

function save(){
  memos.unshift({
    date:date.value,
    title:title.value,
    content:content.value
  });
  localStorage.setItem(KEY,JSON.stringify(memos));
  detail.classList.remove("show");
  render();
}

function edit(i){
  const m=memos[i];
  detail.innerHTML=`
    <input id="date" type="date" value="${m.date}">
    <input id="title" value="${m.title}">
    <textarea id="content">${m.content}</textarea>
    <button onclick="update(${i})">Update</button>
  `;
}

function update(i){
  memos[i]={
    date:date.value,
    title:title.value,
    content:content.value
  };
  localStorage.setItem(KEY,JSON.stringify(memos));
  detail.classList.remove("show");
  render();
}

render();
</script>

</body>
</html>
