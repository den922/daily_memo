<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Memo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f0f2f0;
  --surface: #ffffff;
  --border: #e2e5e2;
  --text: #1a1f1a;
  --sub: #7a8a7a;
  --accent: #3a7d6e;
  --accent-light: #e8f4f1;
  --danger: #c0392b;
  --danger-light: #fdecea;
  --fab-size: 56px;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --transition: 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  color: var(--text);
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--accent);
  color: #fff;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 18px;
  letter-spacing: 0.02em;
  box-shadow: 0 2px 8px rgba(58,125,110,0.25);
  flex-shrink: 0;
  z-index: 10;
}
.header-icon { font-size: 20px; }

/* ── SEARCH ── */
.search {
  padding: 10px 12px;
  background: var(--surface);
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  font-family: inherit;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  transition: border-color var(--transition);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  min-width: 0;
}
.search input:focus { border-color: var(--accent); background: #fff; }
.search-btn {
  padding: 0 14px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
}
.search-btn:active { transform: scale(0.94); }

/* ── LIST ── */
.list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 80px;
  -webkit-overflow-scrolling: touch;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--sub);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-text { font-size: 15px; }

/* ── SWIPE CARD ── */
.swipe-wrap {
  position: relative;
  overflow: hidden;
  margin-bottom: 8px;
  border-radius: var(--radius);
}
.delete-bg {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 80px;
  background: var(--danger);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius);
  gap: 4px;
  flex-direction: column;
  cursor: pointer;
}
.delete-bg span { font-size: 18px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  box-shadow: var(--shadow);
  user-select: none;
  position: relative;
  z-index: 1;
}
.card:active { transform: scale(0.97); box-shadow: none; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.card-date {
  font-size: 11px;
  color: var(--sub);
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 4px;
}
.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-preview {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── FAB ── */
.fab {
  position: fixed;
  right: 20px;
  bottom: 24px;
  width: var(--fab-size);
  height: var(--fab-size);
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(58,125,110,0.4);
  transition: transform var(--transition), box-shadow var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.fab:active { transform: scale(0.92); box-shadow: none; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 92px;   /* FABの上に配置 */
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1a1f1a;
  color: #fff;
  padding: 12px 18px;
  border-radius: 10px;
  display: flex;
  gap: 14px;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap;
  font-size: 14px;
  z-index: 200;
}
.toast.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.toast-undo {
  background: none;
  border: none;
  color: #5dd6b5;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  padding: 0;
}

/* ── DETAIL (slide-up sheet) ── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 300;
}
.detail-overlay.show { opacity: 1; pointer-events: auto; }

.detail {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 0 20px 32px;
  max-height: 92dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 400;
}
.detail.show { transform: translateY(0); }

/* Drag handle */
.detail-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.detail-title-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.detail-close {
  background: var(--bg);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--sub);
  transition: background var(--transition);
}
.detail-close:active { background: var(--border); }

/* View mode */
.view-date {
  font-size: 12px;
  color: var(--sub);
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  display: inline-block;
  padding: 3px 9px;
  border-radius: 5px;
  margin-bottom: 10px;
}
.view-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 14px;
  line-height: 1.3;
}
.view-content {
  font-size: 15px;
  line-height: 1.8;
  color: #3a3f3a;
  white-space: pre-wrap;
  word-break: break-word;
}
.edit-btn {
  margin-top: 24px;
  width: 100%;
  padding: 13px;
  background: var(--accent-light);
  color: var(--accent);
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
}
.edit-btn:active { background: #d0eae5; }

/* Form fields */
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--sub);
  margin-bottom: 5px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.field input,
.field textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: inherit;
  font-size: 16px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color var(--transition), background var(--transition);
  resize: none;
  -webkit-appearance: none;
  appearance: none;
  display: block;
}
.field input:focus,
.field textarea:focus {
  border-color: var(--accent);
  background: #fff;
}
.field textarea { height: 150px; line-height: 1.6; }

.save-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  letter-spacing: 0.02em;
}
.save-btn:active { transform: scale(0.98); background: #2d6459; }

.error-msg {
  color: var(--danger);
  font-size: 13px;
  margin-bottom: 12px;
  display: none;
}
.error-msg.show { display: block; }

/* ── HIGHLIGHT ── */
mark.hl {
  background: #fff0a0;
  color: var(--text);
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}
</style>

</head>
<body>

<div class="header">
  <span class="header-icon">📝</span>
  Daily Memo
</div>

<div class="search">
  <input id="searchInput" placeholder="メモを検索..." autocomplete="off">
  <button class="search-btn" id="searchBtn">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" id="fab">+</button>

<div class="toast" id="toast">
  <span>削除しました</span>
  <button class="toast-undo" id="toastUndo">元に戻す</button>
</div>

<div class="detail-overlay" id="overlay"></div>
<div class="detail" id="detail">
  <div class="detail-handle"></div>
  <div id="detailContent"></div>
</div>

<script>
const KEY = "memo_v15";

/* ── STATE ── */
const state = {
  memos: JSON.parse(localStorage.getItem(KEY) || "[]"),
  lastDeleted: null,
  swipe: { el: null, startX: 0, currentX: 0, moved: false },
  toastTimer: null,
  editingIndex: null,
};

/* ── PERSIST ── */
function persist() {
  localStorage.setItem(KEY, JSON.stringify(state.memos));
}

/* ── HELPERS ── */
function today() {
  return new Date().toISOString().slice(0, 10);
}

function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ヒットした箇所を<mark>でラップ（XSS安全） */
function highlight(str, q) {
  const escaped = escHtml(str);
  if (!q) return escaped;
  const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escaped.replace(
    new RegExp(escapedQ.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
    m => `<mark class="hl">${m}</mark>`
  );
}

/* contentからヒット周辺のスニペットを抽出 */
function snippet(content, q) {
  if (!content) return "";
  if (!q) return escHtml(content);
  const lower = content.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if (idx === -1) return escHtml(content.slice(0, 80));
  const start = Math.max(0, idx - 30);
  const end = Math.min(content.length, idx + q.length + 60);
  const text = (start > 0 ? "…" : "") + content.slice(start, end) + (end < content.length ? "…" : "");
  return highlight(text, q);
}

function filteredMemos() {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) return state.memos.map((m, i) => ({ m, origIdx: i }));
  return state.memos
    .map((m, i) => ({ m, origIdx: i }))
    .filter(({ m }) => JSON.stringify(m).toLowerCase().includes(q));
}

/* ── RENDER ── */
function render() {
  const list = document.getElementById("list");
  const items = filteredMemos()
    .sort((a, b) => new Date(b.m.date || 0) - new Date(a.m.date || 0));

  if (items.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🗒️</div>
        <div class="empty-text">${searchInput.value ? "検索結果がありません" : "メモがありません\n＋ボタンで追加しましょう"}</div>
      </div>`;
    return;
  }

  const q = searchInput.value.trim();

  list.innerHTML = items.map(({ m, origIdx }) => `
    <div class="swipe-wrap" data-idx="${origIdx}">
      <div class="delete-bg">
        <span>🗑️</span>削除
      </div>
      <div class="card">
        <div class="card-meta">
          <span class="card-date">${escHtml(m.date || "日付なし")}</span>
        </div>
        <div class="card-title">${highlight(m.title || "(タイトルなし)", q)}</div>
        ${m.content ? `<div class="card-preview">${snippet(m.content, q)}</div>` : ""}
      </div>
    </div>
  `).join("");

  /* Attach events per card */
  list.querySelectorAll(".swipe-wrap").forEach(wrap => {
    const origIdx = parseInt(wrap.dataset.idx);
    const card = wrap.querySelector(".card");
    const deleteBg = wrap.querySelector(".delete-bg");

    deleteBg.addEventListener("click", () => deleteItem(origIdx));
    card.addEventListener("click", () => {
      if (!state.swipe.moved) openDetail(origIdx);
    });

    card.addEventListener("touchstart", e => touchStart(e, card), { passive: true });
    card.addEventListener("touchmove", e => touchMove(e, card), { passive: true });
    card.addEventListener("touchend", e => touchEnd(e, card));
  });
}

/* ── SWIPE ── */
function touchStart(e, el) {
  state.swipe.startX = e.touches[0].clientX;
  state.swipe.moved = false;

  if (state.swipe.el && state.swipe.el !== el) {
    state.swipe.el.style.transform = "";
    state.swipe.el = null;
  }
}

function touchMove(e, el) {
  state.swipe.currentX = e.touches[0].clientX;
  const diff = state.swipe.currentX - state.swipe.startX;
  if (Math.abs(diff) > 8) state.swipe.moved = true;
  if (diff < 0) el.style.transform = `translateX(${Math.max(diff, -80)}px)`;
}

function touchEnd(e, el) {
  const diff = state.swipe.currentX - state.swipe.startX;
  if (diff < -60) {
    el.style.transform = "translateX(-80px)";
    state.swipe.el = el;
  } else {
    el.style.transform = "";
    state.swipe.el = null;
  }
  setTimeout(() => { state.swipe.moved = false; }, 50);
}

/* ── DELETE ── */
function deleteItem(origIdx) {
  state.lastDeleted = { item: { ...state.memos[origIdx] }, index: origIdx };
  state.memos.splice(origIdx, 1);
  persist();
  render();
  showToast();
}

/* ── TOAST ── */
function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => {
    toast.classList.remove("show");
    state.lastDeleted = null;
  }, 4000);
}

document.getElementById("toastUndo").addEventListener("click", () => {
  if (!state.lastDeleted) return;
  state.memos.splice(state.lastDeleted.index, 0, state.lastDeleted.item);
  persist();
  render();
  document.getElementById("toast").classList.remove("show");
  state.lastDeleted = null;
});

/* ── DETAIL SHEET ── */
function openSheet() {
  document.getElementById("overlay").classList.add("show");
  document.getElementById("detail").classList.add("show");
}

function closeSheet() {
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("detail").classList.remove("show");
  state.editingIndex = null;
}

document.getElementById("overlay").addEventListener("click", closeSheet);

function renderDetailView(origIdx) {
  const m = state.memos[origIdx];
  document.getElementById("detailContent").innerHTML = `
    <div class="detail-header">
      <div class="detail-title-label">メモ</div>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="view-date">${escHtml(m.date || "日付なし")}</div>
    <div class="view-title">${escHtml(m.title || "(タイトルなし)")}</div>
    <div class="view-content">${escHtml(m.content || "")}</div>
    <button class="edit-btn" id="editBtn">✏️ 編集</button>
  `;
  document.getElementById("detailClose").addEventListener("click", closeSheet);
  document.getElementById("editBtn").addEventListener("click", () => renderDetailEdit(origIdx));
  openSheet();
}

function renderDetailForm(origIdx) {
  const isNew = origIdx === undefined || origIdx === null;
  const m = isNew ? { date: today(), title: "", content: "" } : state.memos[origIdx];

  document.getElementById("detailContent").innerHTML = `
    <div class="detail-header">
      <div class="detail-title-label">${isNew ? "新規メモ" : "編集"}</div>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="error-msg" id="errorMsg">タイトルを入力してください</div>
    <div class="field">
      <label>日付</label>
      <input type="date" id="fDate" value="${escHtml(m.date)}">
    </div>
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="fTitle" placeholder="タイトルを入力" value="${escHtml(m.title)}">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="fContent" placeholder="内容を入力">${escHtml(m.content)}</textarea>

```
</div>
<button class="save-btn" id="saveBtn">${isNew ? "保存" : "更新"}</button>
```

`;

document.getElementById(“detailClose”).addEventListener(“click”, closeSheet);
document.getElementById(“saveBtn”).addEventListener(“click”, () => {
const title = document.getElementById(“fTitle”).value.trim();
const date = document.getElementById(“fDate”).value;
const content = document.getElementById(“fContent”).value.trim();
const err = document.getElementById(“errorMsg”);

```
if (!title) {
  err.classList.add("show");
  document.getElementById("fTitle").focus();
  return;
}
err.classList.remove("show");

if (isNew) {
  state.memos.unshift({ date, title, content });
} else {
  state.memos[origIdx] = { date, title, content };
}
persist();
closeSheet();
render();
```

});

openSheet();
setTimeout(() => document.getElementById(“fTitle”).focus(), 400);
}

function renderDetailEdit(origIdx) {
renderDetailForm(origIdx);
}

function openDetail(origIdx) {
if (origIdx === undefined || origIdx === null) {
renderDetailForm(null);
} else {
renderDetailView(origIdx);
}
}

/* ── FAB ── */
document.getElementById(“fab”).addEventListener(“click”, () => openDetail());

/* ── SEARCH ── */
document.getElementById(“searchInput”).addEventListener(“input”, render);
document.getElementById(“searchBtn”).addEventListener(“click”, render);
document.getElementById(“searchInput”).addEventListener(“keydown”, e => {
if (e.key === “Enter”) render();
});

/* ── INIT ── */
render();
</script>

</body>
</html>
