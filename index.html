<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>

<style>
:root{
--bg:#f4f6f7;
--border:#e5e7eb;
--text:#1f2937;
--sub:#6b7280;
--accent:#5fa8a3;
--header:#3e6f73;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,sans-serif;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:var(--header);
color:#fff;
padding:16px;
font-weight:600;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
display:flex;
gap:6px;
border-bottom:1px solid var(--border);
}
.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}
.search button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
}

/* LIST */
.list{
flex:1;
overflow:auto;
padding:8px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
margin-bottom:6px;
font-size:14px;
cursor:pointer;
}

.card-left{
display:flex;
gap:10px;
}

.date{color:var(--sub);font-size:12px;}

.actions{
display:flex;
gap:8px;
}
.actions button{
border:none;
background:none;
font-size:16px;
}

/* FAB */
.fab{
position:fixed;
right:16px;
bottom:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:24px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.3);
display:none;
}
.modal.show{display:block;}

.sheet{
position:absolute;
bottom:0;
width:100%;
background:#fff;
border-radius:16px 16px 0 0;
padding:16px;
max-height:90vh;
overflow:auto;
}

/* CLOSE（date右上外） */
.close-btn{
position:absolute;
top:-10px;
right:10px;
font-size:28px;
border:none;
background:#fff;
border-radius:50%;
width:36px;
height:36px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* INPUT */
input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:16px;
}
input:focus,textarea:focus{
outline:none;
border:2px solid var(--accent);
}

/* PERSON */
.person-row{
display:flex;
gap:6px;
margin-bottom:6px;
}
.person-row input{flex:1;}

.add-person{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

/* BUTTON */
.btn{
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:#fff;
width:100%;
font-weight:600;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:#fff;
display:none;
overflow:auto;
padding:16px;
}
.detail.show{display:block;}
</style>
</head>

<body>

<div class="header">Daily Memo</div>

<div class="search">
<input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') render()">
<button onclick="render()">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<!-- 入力 -->
<div class="modal" id="modal">
<div class="sheet">
<button class="close-btn" onclick="closeModal()">×</button>

<input id="date" type="date">
<input id="title" placeholder="Title">

<div id="peopleArea"></div>
<div class="add-person">
<button onclick="addPerson()">+ Add Person</button>
</div>

<input id="place" placeholder="Where">
<textarea id="content" placeholder="Memo"></textarea>
<input id="tags" placeholder="Tag">

<button class="btn" onclick="saveMemo()">Save</button>
</div>
</div>

<!-- 詳細 -->
<div class="detail" id="detail"></div>

<script>
const KEY="memo_v11";
let memos=JSON.parse(localStorage.getItem(KEY)||"[]");
let editIndex=null;

/* PERSON */
function addPerson(name="",company=""){
  const div=document.createElement("div");
  div.className="person-row";
  div.innerHTML=`
    <input placeholder="Company" value="${company}">
    <input placeholder="Name" value="${name}">
    <button onclick="this.parentElement.remove()">×</button>
  `;
  peopleArea.appendChild(div);
}

/* TEXT統合（検索用） */
function fullText(m){
  const people=(m.people||[]).map(p=>p.company+" "+p.name).join(" ");
  return [m.title,m.content,m.place,m.tags?.join(" "),people].join(" ").toLowerCase();
}

/* 2gram */
function tok(t){
  const r=[];
  for(let i=0;i<t.length-1;i++) r.push(t.slice(i,i+2));
  return r;
}

/* 類似度 */
function sim(a,b){
  const A=new Set(a),B=new Set(b);
  let i=0;A.forEach(x=>{if(B.has(x))i++;});
  return i/(A.size+B.size-i||1);
}

/* SEARCH */
function search(q){
  if(!q) return memos.map((m,i)=>({m,i,score:1}));
  const qt=tok(q.toLowerCase());
  return memos.map((m,i)=>{
    return {m,i,score:sim(qt,tok(fullText(m)))};
  }).filter(x=>x.score>0.1).sort((a,b)=>b.score-a.score);
}

/* RENDER */
function render(){
  const q=searchInput.value;
  const res=search(q).sort((a,b)=> new Date(b.m.date)-new Date(a.m.date));

  list.innerHTML=res.map(r=>`
    <div class="card" onclick="openDetail(${r.i})">
      <div class="card-left">
        <div class="date">${r.m.date||""}</div>
        <div>${r.m.title||"(No title)"}</div>
      </div>
      <div class="actions">
        <button onclick="event.stopPropagation();editMemo(${r.i})">✏️</button>
        <button onclick="event.stopPropagation();deleteMemo(${r.i})">🗑️</button>
      </div>
    </div>
  `).join("");
}

/* DETAIL */
function openDetail(i){
  const m=memos[i];
  detail.innerHTML=`
    <h2>${m.title||""}</h2>
    <p>${m.date||""}</p>
    <p>${m.place||""}</p>
    <p>${(m.people||[]).map(p=>p.company+" "+p.name).join("<br>")}</p>
    <hr>
    <p>${m.content||""}</p>
    <br>
    <button onclick="editMemo(${i})">Edit</button>
    <button onclick="deleteMemo(${i})">Delete</button>
    <button onclick="closeDetail()">Close</button>
  `;
  detail.classList.add("show");
}
function closeDetail(){detail.classList.remove("show");}

/* MODAL */
function openModal(){
  modal.classList.add("show");
  date.value=new Date().toISOString().split('T')[0];
  title.value="";
  content.value="";
  place.value="";
  tags.value="";
  peopleArea.innerHTML="";
  addPerson();
  editIndex=null;
}
function closeModal(){modal.classList.remove("show");}

/* SAVE */
function saveMemo(){
  const people=[...document.querySelectorAll(".person-row")]
    .map(r=>{
      const i=r.querySelectorAll("input");
      return {company:i[0].value,name:i[1].value};
    });

  const memo={
    date:date.value,
    title:title.value,
    content:content.value,
    place:place.value,
    people,
    tags:tags.value.split(",").map(t=>t.trim()).filter(Boolean)
  };

  if(editIndex!==null){memos[editIndex]=memo;}
  else{memos.unshift(memo);}

  localStorage.setItem(KEY,JSON.stringify(memos));
  closeModal();
  render();
}

/* EDIT */
function editMemo(i){
  const m=memos[i];
  openModal();
  date.value=m.date;
  title.value=m.title;
  content.value=m.content;
  place.value=m.place;
  tags.value=(m.tags||[]).join(", ");
  peopleArea.innerHTML="";
  (m.people||[]).forEach(p=>addPerson(p.name,p.company));
  editIndex=i;
}

/* DELETE */
function deleteMemo(i){
  if(confirm("Delete this memo?")){
    memos.splice(i,1);
    localStorage.setItem(KEY,JSON.stringify(memos));
    render();
  }
}

render();
</script>

</body>
</html>
