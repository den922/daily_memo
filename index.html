<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>

<style>
:root {
--bg:#f4f6f7;
--border:#e5e7eb;
--text:#1f2937;
--sub:#6b7280;
--accent:#5fa8a3;
--header:#3e6f73;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,sans-serif;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:var(--header);
color:#fff;
padding:16px;
font-weight:600;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
display:flex;
gap:6px;
border-bottom:1px solid var(--border);
}
.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}
.search button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
}

/* LIST */
.list{
flex:1;
overflow:auto;
padding:8px;
}

/* コンパクトカード */
.card{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
margin-bottom:6px;
font-size:14px;
}

.card-left{
display:flex;
gap:10px;
}

.date{color:var(--sub);font-size:12px;}

.actions{
display:flex;
gap:8px;
}
.actions button{
border:none;
background:none;
font-size:16px;
}

/* FAB */
.fab{
position:fixed;
right:16px;
bottom:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:24px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.3);
display:none;
}
.modal.show{display:block;}

.sheet{
position:absolute;
bottom:0;
width:100%;
background:#fff;
border-radius:16px 16px 0 0;
padding:16px;
max-height:90vh;
overflow:auto;
}

/* 右上× */
.close-btn{
position:absolute;
top:10px;
right:14px;
font-size:26px;
border:none;
background:none;
}

/* 入力欄 */
input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:16px;
}

/* フォーカス */
input:focus,textarea:focus{
outline:none;
border:2px solid var(--accent);
}

/* PERSON */
.person-row{
display:flex;
gap:6px;
margin-bottom:6px;
}
.person-row input{flex:1;}

.add-person{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

/* BUTTON */
.btn{
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:#fff;
width:100%;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">Daily Memo</div>

<div class="search">
<input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') render()">
<button onclick="render()">🔍</button>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
<div class="sheet">

<button class="close-btn" onclick="closeModal()">×</button>

<input id="date" type="date">
<input id="title" placeholder="Title">

<div id="peopleArea"></div>

<div class="add-person">
<button onclick="addPerson()">+ Add Person</button>
</div>

<input id="place" placeholder="Where">
<textarea id="content" placeholder="Memo"></textarea>

<input id="tags" placeholder="Tag">

<button class="btn" onclick="saveMemo()">Save</button>

</div>
</div>

<script>
const KEY="memo_v10";
let memos=JSON.parse(localStorage.getItem(KEY)||"[]");
let editIndex=null;

/* PERSON */
function addPerson(name="",company=""){
  const div=document.createElement("div");
  div.className="person-row";
  div.innerHTML=`
    <input placeholder="Company" value="${company}">
    <input placeholder="Name" value="${name}">
    <button onclick="this.parentElement.remove()">×</button>
  `;
  peopleArea.appendChild(div);
}

/* SEARCH */
function search(q){
  if(!q) return memos;
  return memos.filter(m =>
    (m.title+m.content+m.place).toLowerCase().includes(q.toLowerCase())
  );
}

/* RENDER */
function render(){
  const q=searchInput.value;
  const res=search(q).sort((a,b)=> new Date(b.date)-new Date(a.date));

  list.innerHTML=res.map((m,i)=>`
    <div class="card">
      <div class="card-left">
        <div class="date">${m.date||""}</div>
        <div>${m.title||"(No title)"}</div>
      </div>
      <div class="actions">
        <button onclick="editMemo(${i})">✏️</button>
        <button onclick="deleteMemo(${i})">🗑️</button>
      </div>
    </div>
  `).join("");
}

/* MODAL */
function openModal(){
  modal.classList.add("show");

  // 毎回リセット
  date.value = new Date().toISOString().split('T')[0];
  title.value="";
  content.value="";
  place.value="";
  tags.value="";
  peopleArea.innerHTML="";
  addPerson();

  editIndex=null;
}

function closeModal(){
  modal.classList.remove("show");
}

/* SAVE */
function saveMemo(){
  const people=[...document.querySelectorAll(".person-row")]
    .map(r=>{
      const i=r.querySelectorAll("input");
      return {company:i[0].value,name:i[1].value};
    });

  const memo={
    date:date.value,
    title:title.value,
    content:content.value,
    place:place.value,
    people,
    tags:tags.value.split(",").map(t=>t.trim()).filter(Boolean)
  };

  if(editIndex!==null){
    memos[editIndex]=memo;
  }else{
    memos.unshift(memo);
  }

  localStorage.setItem(KEY,JSON.stringify(memos));
  closeModal();
  render();
}

/* EDIT */
function editMemo(i){
  const m=memos[i];
  openModal();
  date.value=m.date;
  title.value=m.title;
  content.value=m.content;
  place.value=m.place;
  tags.value=(m.tags||[]).join(", ");
  peopleArea.innerHTML="";
  (m.people||[]).forEach(p=>addPerson(p.name,p.company));
  editIndex=i;
}

/* DELETE */
function deleteMemo(i){
  if(confirm("Delete this memo?")){
    memos.splice(i,1);
    localStorage.setItem(KEY,JSON.stringify(memos));
    render();
  }
}

render();
</script>

</body>
</html>
